steps:
  # 1. Build and Deploy api-control
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/api-control', './functions/api-control']
    id: 'build-api-control'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api-control']
    id: 'push-api-control'
    waitFor: ['build-api-control']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'api-control'
      - '--image'
      - 'gcr.io/$PROJECT_ID/api-control'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'deploy-api-control'
    waitFor: ['push-api-control']

  # 2. Build and Deploy proxy-snapshot
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/proxy-snapshot', './functions/proxy-snapshot']
    id: 'build-proxy-snapshot'
    waitFor: ['-'] # Start in parallel with api-control build

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/proxy-snapshot']
    id: 'push-proxy-snapshot'
    waitFor: ['build-proxy-snapshot']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'proxy-snapshot'
      - '--image'
      - 'gcr.io/$PROJECT_ID/proxy-snapshot'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'deploy-proxy-snapshot'
    waitFor: ['push-proxy-snapshot']

  # 3. Deploy Firebase Hosting
  - name: 'gcr.io/$PROJECT_ID/firebase' # Uses a custom firebase builder or npx
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npx firebase-tools deploy --only hosting --project $PROJECT_ID --token "$$FIREBASE_TOKEN"
    id: 'deploy-hosting'
    waitFor: ['deploy-api-control', 'deploy-proxy-snapshot']
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
    env: 'FIREBASE_TOKEN'

timeout: '1200s'
options:
  machineType: 'E2_HIGHCPU_8'
